version: "3.9"

services:
  api:
    build:
    container_name: clinic_manegement
    ports:
      -"8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db

db:
  image: mysql:8
  container_name: exemplo_name
  restart: always
  environment:
    MYSQL_ROOT_PASSWORD: root
    MYSQL_DATABASE: EXEMPLO_DB
  ports:
    - "3306:3306"
  volumes:
    - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  
